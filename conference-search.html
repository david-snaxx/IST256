<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Conference Search | NittanyConf</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="/css/style.css"/>
</head>
<body class="d-flex flex-column min-vh-100">
<div id="navbar"></div>

    <main class="flex-grow-1 py-5">

        <div class="container mt-4">
            <h1>Search Conference Entries</h1>

            <!-- Search box -->
            <input id="searchInput" class="form-control my-3" placeholder="Search entries..."/>

            <table class="table table-striped">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Category</th>
                    <th>Format</th>
                    <th>Price</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody id="entriesBody"></tbody>
            </table>
        </div>
    </main>

    <div id="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" defer></script>
    <script src="/js/site.js" defer></script>
    <script src="js/conference-search.js" defer></script>
    <script src="js/conference-entry.js" defer></script>
</body>
</html>
