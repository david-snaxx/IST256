<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Product Details | NittanyConf</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="/css/style.css"/>
    <link rel="stylesheet" href="/css/index.css"/>
</head>
<body class="d-flex flex-column min-vh-100">
<div id="navbar"></div>

<main class="flex-grow-1 py-5">
    <section class="mt-4">
        <div class="container mt-4">
            <a href="product-entry.html" class="btn btn-outline-secondary mb-3">← Back to Product Entry</a>

            <h1>Product Details</h1>

            <div id="notFound" class="alert alert-danger d-none mt-3">
                Product not found. Please go back and try again.
            </div>

            <div id="detailsCard" class="card mt-3 d-none">
                <div class="card-body">
                    <p><strong>ID:</strong> <span id="detailsId"></span></p>
                    <p><strong>Title:</strong> <span id="detailsTitleText"></span></p>
                    <p><strong>Description:</strong> <span id="detailsDescription"></span></p>
                    <p><strong>Category:</strong> <span id="detailsCategory"></span></p>
                    <p><strong>Specifications:</strong> <span id="detailsSpecifications"></span></p>
                    <p><strong>Price:</strong> $<span id="detailsPrice"></span></p>

                    <div class="mb-3">
                        <strong>Product Image:</strong><br>
                        <img id="detailsImage" src="" alt="Product image" class="img-fluid rounded mt-2" style="max-width: 300px;">
                    </div>

                    <p><strong>Additional Info:</strong> <span id="detailsAdditional"></span></p>

                    <div class="mt-3">
                        <button id="addToCartBtn" class="btn btn-primary">Add to Cart</button>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>

<div id="footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="/js/site.js" defer></script>
<script type="module" src="js/product-details.js"></script>
</body>
</html>
